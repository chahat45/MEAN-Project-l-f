<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found Portal</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="text-center mb-4">
    <h1 class="fw-bold">Lost & Found Portal</h1>
    <p class="text-muted">Report and find the lost items</p>
  </div>

  <!-- Add Item Form -->
  <div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
      Add Item
    </div>
    <div class="card-body">

      <div class="row g-3">

        <div class="col-md-4">
          <input id="name" class="form-control" placeholder="Item Name">
        </div>

        <div class="col-md-4">
          <input id="location" class="form-control" placeholder="Location">
        </div>

        <div class="col-md-4">
          <input id="contact" class="form-control" placeholder="Contact">
        </div>

        <div class="col-md-6">
          <input id="description" class="form-control" placeholder="Description">
        </div>

        <div class="col-md-3">
          <input id="date" type="date" class="form-control">
        </div>

        <div class="col-md-3">
          <select id="status" class="form-control">
            <option value="Lost">Lost</option>
            <option value="Found">Found</option>
          </select>
        </div>

      </div>

      <div class="mt-3 text-end">
        <button class="btn btn-success" onclick="addItem()">Add Item</button>
      </div>

    </div>
  </div>

  <!-- Items list-->
  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      Items List
    </div>
    <div class="card-body">

      <button class="btn btn-primary mb-3" onclick="loadItems()">Refresh</button>

      <div class="table-responsive">
        <table class="table table-bordered table-hover text-center">

          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Location</th>
              <th>Contact</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>
      </div>

    </div>
  </div>

</div>

<script>

const baseUrl = "/items";

// Add Item
async function addItem(){

  let data = {
    name: document.getElementById("name").value,
    location: document.getElementById("location").value,
    contact: document.getElementById("contact").value,
    description: document.getElementById("description").value,
    date: document.getElementById("date").value,
    status: document.getElementById("status").value
  };

  await fetch(baseUrl + "/add",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert("Item Added");
  loadItems();
}

// Load Items
async function loadItems(){

  let res = await fetch(baseUrl + "/all");
  let items = await res.json();

  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  items.forEach(item => {

    let statusBadge = item.status === "Lost"
      ? `<span class="badge bg-danger">Lost</span>`
      : `<span class="badge bg-success">Found</span>`;

    let row = `
      <tr>
        <td>${item.name}</td>
        <td>${item.location}</td>
        <td>${item.contact || ""}</td>
        <td>${statusBadge}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteItem('${item._id}')">
            Delete
          </button>
        </td>
      </tr>
    `;

    table.innerHTML += row;

  });
}

// Delete Item
async function deleteItem(id){

  await fetch(baseUrl + "/delete/" + id,{
    method:"DELETE"
  });

  loadItems();
}

</script>

</body>
</html>
