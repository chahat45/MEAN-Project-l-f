<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found Portal</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!--old-->
<div class="container mt-5">

  <div class="text-center mb-4">
    <h1 class="fw-bold">Lost & Found Portal</h1>
    <p class="text-muted">Report and find the lost items</p>
  </div>

  <!-- Add Item Form -->
  <div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
      Add Item
    </div>
    <div class="card-body">

      <div class="row g-3">

        <div class="col-md-4">
          <input id="name" class="form-control" placeholder="Item Name">
        </div>

        <div class="col-md-4">
          <input id="location" class="form-control" placeholder="Location">
        </div>

        <div class="col-md-4">
          <input id="contact" class="form-control" placeholder="Contact">
        </div>

        <div class="col-md-6">
          <input id="description" class="form-control" placeholder="Description">
        </div>

        <div class="col-md-3">
          <input id="date" type="date" class="form-control">
        </div>

        <div class="col-md-3">
          <select id="status" class="form-control">
            <option value="Lost">Lost</option>
            <option value="Found">Found</option>
          </select>
        </div>

         <!-- Reward -->
  <div class="col-md-4">
    <label class="form-label">Reward (₹)</label>
    <input id="reward" type="number" class="form-control" placeholder="Enter reward (optional)">
  </div>

  <!-- Google Maps -->
  <div class="col-md-4">
    <label class="form-label">Google Maps Link</label>
    <input id="gmap" type="url" class="form-control" placeholder="Paste map link (optional)">
  </div>

  <!-- Image Upload -->
  <div class="col-md-4">
    <label class="form-label">Upload Image</label>
    <input type="file" id="image" class="form-control">
  </div>

      </div>

      <div class="mt-3 text-end">
        <button class="btn btn-success" onclick="addItem()">Add Item</button>
      </div>

    </div>
  </div>

  <!--search-->
  <div class="mb-3">
  <input 
    id="search" 
    class="form-control" 
    placeholder="🔍 Search items..." 
    onkeyup="searchItems()"
  >
</div>
  <!-- Items list-->
  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      Items List
    </div>
    <div class="card-body">

      <button class="btn btn-primary mb-3" onclick="loadItems()">Refresh</button>
      <button class="btn btn-danger" onclick="logout()">Logout</button>

      <div class="table-responsive">
        <table class="table table-bordered table-hover text-center">

          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Location</th>
              <th>Contact</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>
      </div>

    </div>
  </div>

</div>

<script>
let allItems = [];
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "auth.html";
}

async function markFound(id){

  let venue = prompt("Enter collection venue:");
  let qr = prompt("Enter QR code text or image link:");

  await fetch("/items/found/" + id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      foundBy: user.rollNo,
      collectionVenue: venue,
      qrCode: qr
    })
  });

  loadItems();
}

async function confirmItem(id){

  await fetch("/items/confirm/" + id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      user: user.rollNo
    })
  });

  loadItems();
}

// Add Item
async function addItem(){

  let file = document.getElementById("image").files[0];

  let data = {
    name: document.getElementById("name").value,
    location: document.getElementById("location").value,
    reward: document.getElementById("reward").value || 0,
    gmapLink: document.getElementById("gmap").value,
    createdBy: user.rollNo
  };

  // If no image
  if(!file){
    await sendData(data);
    return;
  }

  let reader = new FileReader();

  reader.onload = async function(){
    data.image = reader.result;
    await sendData(data);
  };

  reader.readAsDataURL(file);
}

// separate function
async function sendData(data){

  try{
    let res = await fetch("/items/add",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    let msg = await res.text();
    console.log(msg);

    alert("Item Added Successfully");

    loadItems();

  } catch(err){
    console.log(err);
    alert("Error adding item");
  }
}

// Load Items
async function loadItems(){

  console.log("Loading items...");

  try{
    let res = await fetch("/items/all");

    console.log("Response:", res);

    let data = await res.json();

    console.log("Data:", data);

    allItems = data;

    displayItems(allItems);

  } catch(err){
    console.log("Error:", err);
  }
}

//search
function searchItems(){

  let keyword = document.getElementById("search").value.toLowerCase();

  let filtered = allItems.filter(item => {

    return (
      item.name.toLowerCase().includes(keyword) ||
      item.location.toLowerCase().includes(keyword) ||
      (item.contact && item.contact.toLowerCase().includes(keyword)) ||
      item.status.toLowerCase().includes(keyword)
    );

  });

  displayItems(filtered);
}
//display item
function displayItems(items){

  let container = document.getElementById("tableBody");
  container.innerHTML = "";

  if(items.length === 0){
    container.innerHTML = "<tr><td colspan='5'>No items found</td></tr>";
    return;
  }

  items.forEach(item => {

    let actionBtn = "";
    let privateInfo = "";

    // Action buttons
    if(item.status === "Lost"){
      actionBtn += `<button class="btn btn-warning btn-sm" onclick="markFound('${item._id}')">Mark Found</button>`;
    }

    if(item.status === "Found"){
      actionBtn += `<button class="btn btn-success btn-sm ms-2" onclick="confirmItem('${item._id}')">Confirm</button>`;
    }

    // Private info (ONLY owner + admin)
    if(item.status === "Found" && 
      (user.rollNo === item.createdBy || user.role === "admin")){

      privateInfo = `
        <br>
        <small class="text-muted">
          📍 Venue: ${item.collectionVenue || "N/A"} <br>
          🔳 QR: ${item.qrCode || "N/A"}
        </small>
      `;
    }

    let row = `
      <tr>
        <td>${item.name}</td>
        <td>${item.location}</td>
        <td>${item.contact || "-"}</td>
        <td>
          ${item.status}
          ${privateInfo}
        </td>
        <td>${actionBtn}</td>
      </tr>
    `;

    container.innerHTML += row;
  });
}
// Delete Item
async function deleteItem(id){

  await fetch(baseUrl + "/delete/" + id,{
    method:"DELETE"
  });

  loadItems();
}

loadItems();

function logout(){
  localStorage.removeItem("user");
  window.location.href = "auth.html";
}

</script>

</body>
</html>
